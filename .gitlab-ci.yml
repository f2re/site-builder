# .gitlab-ci.yml — GitLab CI/CD Pipeline
# NEVER use GitHub Actions (.github/workflows/)
# Registry: GitLab Container Registry (not Docker Hub)

default:
  tags:
    - site-builder

workflow:
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/

image: docker:24

variables:
  DOCKER_TLS_CERTDIR: ""
  DOCKER_HOST: unix:///var/run/docker.sock
  REGISTRY: $CI_REGISTRY
  IMAGE_BACKEND: $CI_REGISTRY_IMAGE/backend
  IMAGE_FRONTEND: $CI_REGISTRY_IMAGE/frontend
  IMAGE_TAG: $CI_COMMIT_TAG
  DYNAMIC_TAG: $CI_COMMIT_TAG

stages:
  - lint
  - test
  - build
  - deploy_staging
  - smoke_staging
  - deploy_prod
  - smoke_prod

# ── Templates ────────────────────────────────────────────────────────────────
.docker_login: &docker_login
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_JOB_TOKEN $CI_REGISTRY

# ── Lint ─────────────────────────────────────────────────────────────────────
lint:backend:
  stage: lint
  image: python:3.12-slim
  services: []
  script:
    - pip install ruff mypy types-bleach types-aiofiles --quiet
    - ruff check backend/app/ --fix || true
    - ruff check backend/app/
    - mypy backend/app/ --ignore-missing-imports

lint:frontend:
  stage: lint
  image: node:20-alpine
  services: []
  script:
    - cd frontend && npm install --quiet
    - npm run lint
    - npm run typecheck

# ── Security Audit ────────────────────────────────────────────────────────────
security:backend:
  stage: test
  image: python:3.12-slim
  services: []
  script:
    - pip install bandit safety --quiet
    - bandit -r backend/app/ -ll -f json -o bandit.json || true
    # FIX: safety check устарела → заменена на safety scan
    - safety scan -r backend/requirements.txt --output json > safety.json || true
  artifacts:
    paths: [bandit.json, safety.json]
    when: always
    expire_in: 30 days
  allow_failure: true

security:frontend:
  stage: test
  image: node:20-alpine
  services: []
  script:
    - cd frontend && npm install --quiet
    - npm audit --audit-level=high --json > npm_audit.json || true
  artifacts:
    paths: [frontend/npm_audit.json]
    when: always
    expire_in: 30 days
  allow_failure: true

# ── Test ──────────────────────────────────────────────────────────────────────
test:backend:
  stage: test
  image: python:3.12-slim
  services:
    - name: timescale/timescaledb:latest-pg16
      alias: postgres
    - name: redis:7-alpine
      alias: redis
  variables:
    POSTGRES_DB: sb_test
    POSTGRES_USER: sb_user
    POSTGRES_PASSWORD: testpassword
    # FIX: добавлен POSTGRES_HOST_AUTH_METHOD для надёжной аутентификации
    POSTGRES_HOST_AUTH_METHOD: md5
    DATABASE_URL: postgresql+asyncpg://sb_user:testpassword@postgres:5432/sb_test
    TEST_DATABASE_URL: postgresql+asyncpg://sb_user:testpassword@postgres:5432/sb_test
    REDIS_URL: redis://redis:6379/0
    SECRET_KEY: test-secret-key-for-ci
    CELERY_TASK_ALWAYS_EAGER: "True"
    PYTHONPATH: "."
  script:
    - cd backend
    - pip install -r requirements.txt --quiet
    - pytest --cov=app tests/unit/ tests/integration/ -v

# ── Build ─────────────────────────────────────────────────────────────────────
build:backend:
  stage: build
  <<: *docker_login
  script:
    - docker pull $IMAGE_BACKEND:latest || true
    - docker build --cache-from $IMAGE_BACKEND:latest -t $IMAGE_BACKEND:$DYNAMIC_TAG -t $IMAGE_BACKEND:latest ./backend
    - docker push $IMAGE_BACKEND:$DYNAMIC_TAG
    - docker push $IMAGE_BACKEND:latest

build:frontend:
  stage: build
  <<: *docker_login
  script:
    - docker pull $IMAGE_FRONTEND:latest || true
    - docker build --cache-from $IMAGE_FRONTEND:latest -t $IMAGE_FRONTEND:$DYNAMIC_TAG -t $IMAGE_FRONTEND:latest ./frontend
    - docker push $IMAGE_FRONTEND:$DYNAMIC_TAG
    - docker push $IMAGE_FRONTEND:latest

# ── Deploy base ───────────────────────────────────────────────────────────────
# SSH_PRIVATE_KEY — переменная типа File.
# FIX: ключевое исправление — нормализация ключа перед ssh-add:
#   1. tr -d '\r'     → убирает Windows CRLF
#   2. echo ""        → гарантирует завершающий LF (главная причина libcrypto error)
.deploy_base:
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client bash
    - eval $(ssh-agent -s)
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    # === MAIN FIX: sanitize key — strip CRLF + ensure trailing newline ===
    - |
      if [ -z "$DEPLOY_HOST" ]; then
        echo "❌ ERROR: DEPLOY_HOST (STAGING_HOST or PROD_HOST) is not defined in GitLab CI/CD Variables!"
        exit 1
      fi
    - SSH_KEY_TMP=$(mktemp)
    - tr -d '\r' < "$SSH_PRIVATE_KEY" > "$SSH_KEY_TMP"
    - echo "" >> "$SSH_KEY_TMP"
    - chmod 600 "$SSH_KEY_TMP"
    - ssh-add "$SSH_KEY_TMP"
    - rm -f "$SSH_KEY_TMP"
    # =====================================================================
    - ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

# ── Deploy Staging ────────────────────────────────────────────────────────────
deploy:staging:
  extends: .deploy_base
  stage: deploy_staging
  variables:
    DEPLOY_HOST: $STAGING_HOST
  script:
    - scp deploy/scripts/deploy.sh $DEPLOY_USER@$STAGING_HOST:/tmp/deploy.sh
    - ssh $DEPLOY_USER@$STAGING_HOST "bash /tmp/deploy.sh $DYNAMIC_TAG $CI_REGISTRY $DEPLOY_TOKEN_USER $DEPLOY_TOKEN_PASS $CI_REGISTRY_IMAGE"
  environment:
    name: staging
    url: https://m.wifiobd.ru


# ── Deploy Production ─────────────────────────────────────────────────────────
deploy:production:
  extends: .deploy_base
  stage: deploy_prod
  variables:
    DEPLOY_HOST: $PROD_HOST
  script:
    - scp deploy/scripts/deploy.sh $DEPLOY_USER@$PROD_HOST:/tmp/deploy.sh
    - ssh $DEPLOY_USER@$PROD_HOST "bash /tmp/deploy.sh $DYNAMIC_TAG $CI_REGISTRY $DEPLOY_TOKEN_USER $DEPLOY_TOKEN_PASS $CI_REGISTRY_IMAGE"
  environment:
    name: production
    url: https://m.wifiobd.ru
  rules:
    - when: manual
