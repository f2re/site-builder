# .gitlab-ci.yml — GitLab CI/CD Pipeline
# NEVER use GitHub Actions (.github/workflows/)
# Registry: GitLab Container Registry (not Docker Hub)

image: docker:24

services:
  - docker:24-dind

variables:
  DOCKER_TLS_CERTDIR: "/certs"
  REGISTRY: $CI_REGISTRY
  IMAGE_BACKEND: $CI_REGISTRY_IMAGE/backend
  IMAGE_FRONTEND: $CI_REGISTRY_IMAGE/frontend

stages:
  - lint
  - test
  - build
  - deploy_staging
  - deploy_prod

# ── Templates ────────────────────────────────────────────────────────────────
.docker_login: &docker_login
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY

# ── Lint ─────────────────────────────────────────────────────────────────────
lint:backend:
  stage: lint
  image: python:3.12-slim
  script:
    - pip install ruff mypy --quiet
    - ruff check backend/app/
    - mypy backend/app/ --ignore-missing-imports
  rules:
    - changes: ["backend/**/*"]

lint:frontend:
  stage: lint
  image: node:20-alpine
  script:
    - cd frontend && npm ci --quiet
    - npm run lint
    - npm run typecheck
  rules:
    - changes: ["frontend/**/*"]

# ── Test ──────────────────────────────────────────────────────────────────────
test:backend:
  stage: test
  image: python:3.12-slim
  services:
    - name: timescale/timescaledb:latest-pg16
      alias: postgres
    - name: redis:7-alpine
      alias: redis
  variables:
    POSTGRES_DB: sb_test
    POSTGRES_USER: sb_user
    POSTGRES_PASSWORD: testpassword
    DATABASE_URL: postgresql+asyncpg://sb_user:testpassword@postgres:5432/sb_test
    TEST_DATABASE_URL: postgresql+asyncpg://sb_user:testpassword@postgres:5432/sb_test
    REDIS_URL: redis://redis:6379/0
    SECRET_KEY: test-secret-key-for-ci
    JWT_SECRET_KEY: test-jwt-secret
    FERNET_KEY: "CHANGE_ME_IN_CI_VARIABLES_FERNET"
  script:
    - cd backend
    - pip install -r requirements.txt --quiet
    - pytest --cov=app tests/unit/ tests/integration/ -v --cov-report=xml:coverage.xml
  coverage: '/TOTAL.*\s+(\d+%)$/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: backend/coverage.xml
    when: always
    expire_in: 7 days
  rules:
    - changes: ["backend/**/*", "tests/**/*"]

test:frontend:
  stage: test
  image: node:20-alpine
  script:
    - cd frontend && npm ci --quiet
    - npm run test:unit
  rules:
    - changes: ["frontend/**/*"]

# ── Security Audit ────────────────────────────────────────────────────────────
security:backend:
  stage: test
  image: python:3.12-slim
  script:
    - pip install bandit safety --quiet
    - bandit -r backend/app/ -ll -f json -o bandit.json || true
    - safety check -r backend/requirements.txt --output json > safety.json || true
  artifacts:
    paths: [bandit.json, safety.json]
    when: always
    expire_in: 30 days
  allow_failure: true

security:frontend:
  stage: test
  image: node:20-alpine
  script:
    - cd frontend && npm ci --quiet
    - npm audit --audit-level=high --json > npm_audit.json || true
  artifacts:
    paths: [frontend/npm_audit.json]
    when: always
    expire_in: 30 days
  allow_failure: true

# ── Build ─────────────────────────────────────────────────────────────────────
build:backend:
  stage: build
  <<: *docker_login
  script:
    - docker build -t $IMAGE_BACKEND:$CI_COMMIT_SHORT_SHA -t $IMAGE_BACKEND:latest ./backend
    - docker push $IMAGE_BACKEND:$CI_COMMIT_SHORT_SHA
    - docker push $IMAGE_BACKEND:latest
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

build:frontend:
  stage: build
  <<: *docker_login
  script:
    - docker build -t $IMAGE_FRONTEND:$CI_COMMIT_SHORT_SHA -t $IMAGE_FRONTEND:latest ./frontend
    - docker push $IMAGE_FRONTEND:$CI_COMMIT_SHORT_SHA
    - docker push $IMAGE_FRONTEND:latest
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

# ── Deploy Staging ────────────────────────────────────────────────────────────
deploy:staging:
  stage: deploy_staging
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | ssh-add -
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - ssh-keyscan $STAGING_HOST >> ~/.ssh/known_hosts
  script:
    - ssh $DEPLOY_USER@$STAGING_HOST "cd /srv/site-builder && docker compose pull && docker compose up -d --remove-orphans"
  environment:
    name: staging
    url: https://staging.example.com
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: on_success

# ── Deploy Production ─────────────────────────────────────────────────────────
deploy:production:
  stage: deploy_prod
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | ssh-add -
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - ssh-keyscan $PROD_HOST >> ~/.ssh/known_hosts
  script:
    - ssh $DEPLOY_USER@$PROD_HOST "cd /srv/site-builder && docker compose -f deploy/docker-compose.prod.yml pull && docker compose -f deploy/docker-compose.prod.yml up -d --remove-orphans"
  environment:
    name: production
    url: https://example.com
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual  # REQUIRES manual trigger
  # SSH_PRIVATE_KEY must be type=File in GitLab CI/CD Variables
