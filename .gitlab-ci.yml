# .gitlab-ci.yml — GitLab CI/CD Pipeline
# NEVER use GitHub Actions (.github/workflows/)
# Registry: GitLab Container Registry (not Docker Hub)

image: docker:24

variables:
  DOCKER_TLS_CERTDIR: ""
  DOCKER_HOST: tcp://docker:2375
  REGISTRY: $CI_REGISTRY
  IMAGE_BACKEND: $CI_REGISTRY_IMAGE/backend
  IMAGE_FRONTEND: $CI_REGISTRY_IMAGE/frontend
  # Determine image tag: use git tag if present, otherwise commit sha or latest
  IMAGE_TAG: $CI_COMMIT_TAG
  DYNAMIC_TAG: ${CI_COMMIT_TAG:-${CI_COMMIT_SHORT_SHA}}

stages:
  - lint
  - test
  - build
  - deploy_staging
  - deploy_prod

# ── Templates ────────────────────────────────────────────────────────────────
.docker_login: &docker_login
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY

# ── Lint ─────────────────────────────────────────────────────────────────────
lint:backend:
  stage: lint
  image: python:3.12-slim
  services: []
  script:
    - pip install ruff mypy --quiet
    - ruff check backend/app/ --fix || true
    - ruff check backend/app/
    - mypy backend/app/ --ignore-missing-imports
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG

lint:frontend:
  stage: lint
  image: node:20-alpine
  services: []
  script:
    - cd frontend && npm ci --quiet
    - npm run lint
    - npm run typecheck
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG

# ── Security Audit ────────────────────────────────────────────────────────────
security:backend:
  stage: test
  image: python:3.12-slim
  services: []
  script:
    - pip install bandit safety --quiet
    - bandit -r backend/app/ -ll -f json -o bandit.json || true
    - safety check -r backend/requirements.txt --output json > safety.json || true
  artifacts:
    paths: [bandit.json, safety.json]
    when: always
    expire_in: 30 days
  allow_failure: true

security:frontend:
  stage: test
  image: node:20-alpine
  services: []
  script:
    - cd frontend && npm ci --quiet
    - npm audit --audit-level=high --json > npm_audit.json || true
  artifacts:
    paths: [frontend/npm_audit.json]
    when: always
    expire_in: 30 days
  allow_failure: true

# ── Test ──────────────────────────────────────────────────────────────────────
test:backend:
  stage: test
  image: python:3.12-slim
  services:
    - name: timescale/timescaledb:latest-pg16
      alias: postgres
    - name: redis:7-alpine
      alias: redis
  variables:
    POSTGRES_DB: sb_test
    POSTGRES_USER: sb_user
    POSTGRES_PASSWORD: testpassword
    DATABASE_URL: postgresql+asyncpg://sb_user:testpassword@postgres:5432/sb_test
    TEST_DATABASE_URL: postgresql+asyncpg://sb_user:testpassword@postgres:5432/sb_test
    REDIS_URL: redis://redis:6379/0
    SECRET_KEY: test-secret-key-for-ci
  script:
    - cd backend
    - pip install -r requirements.txt --quiet
    - pytest --cov=app tests/unit/ tests/integration/ -v
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG

# ── Build ─────────────────────────────────────────────────────────────────────
build:backend:
  stage: build
  services:
    - name: docker:24-dind
      alias: docker
  <<: *docker_login
  script:
    - docker build -t $IMAGE_BACKEND:$DYNAMIC_TAG -t $IMAGE_BACKEND:latest ./backend
    - docker push $IMAGE_BACKEND:$DYNAMIC_TAG
    - docker push $IMAGE_BACKEND:latest
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG

build:frontend:
  stage: build
  services:
    - name: docker:24-dind
      alias: docker
  <<: *docker_login
  script:
    - docker build -t $IMAGE_FRONTEND:$DYNAMIC_TAG -t $IMAGE_FRONTEND:latest ./frontend
    - docker push $IMAGE_FRONTEND:$DYNAMIC_TAG
    - docker push $IMAGE_FRONTEND:latest
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG

# ── Deploy Staging ────────────────────────────────────────────────────────────
deploy:staging:
  stage: deploy_staging
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client bash
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | ssh-add -
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - ssh-keyscan $STAGING_HOST >> ~/.ssh/known_hosts
  script:
    - scp deploy/scripts/deploy.sh $DEPLOY_USER@$STAGING_HOST:/tmp/deploy.sh
    - ssh $DEPLOY_USER@$STAGING_HOST "bash /tmp/deploy.sh $DYNAMIC_TAG"
  environment:
    name: staging
    url: https://staging.example.com
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: on_success

# ── Deploy Production ─────────────────────────────────────────────────────────
deploy:production:
  stage: deploy_prod
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client bash
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | ssh-add -
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - ssh-keyscan $PROD_HOST >> ~/.ssh/known_hosts
  script:
    - scp deploy/scripts/deploy.sh $DEPLOY_USER@$PROD_HOST:/tmp/deploy.sh
    - ssh $DEPLOY_USER@$PROD_HOST "bash /tmp/deploy.sh $DYNAMIC_TAG"
  environment:
    name: production
    url: https://example.com
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/  # Trigger on tags like v1.0.0
      when: on_success
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual  # Manual deploy for main branch
