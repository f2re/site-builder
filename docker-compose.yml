# docker-compose.yml — Development Environment
# ALL services required for local development.
# Use 'docker compose up -d' to start.
# Production: see deploy/docker-compose.prod.yml

version: "3.9"

services:

  # ── Backend ──────────────────────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: sb_api
    restart: unless-stopped
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health | grep -q 'ok'"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks: [sb_net]

  # ── Frontend ─────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: sb_frontend
    restart: unless-stopped
    env_file: .env
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - api
    command: npm run dev
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3000/"]
      interval: 30s
      timeout: 15s
      retries: 10
      start_period: 120s
    networks: [sb_net]

  # ── PostgreSQL 16 + TimescaleDB ───────────────────────────────────────────
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: sb_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [sb_net]

  # ── Redis 7 ───────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: sb_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks: [sb_net]

  # ── Celery (worker + beat в одном контейнере) ─────────────────────────────
  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: sb_celery
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./backend:/app
      - ./media:/app/media
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    # -B запускает beat-планировщик внутри того же процесса worker
    command: celery -A app.tasks.celery_app worker -B --loglevel=info --concurrency=1
    networks: [sb_net]

  # ── Meilisearch ──────────────────────────────────────────────────────────
  meilisearch:
    image: getmeili/meilisearch:v1.36.0
    container_name: sb_meilisearch
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}
      MEILI_ENV: development
    ports:
      - "7700:7700"
    volumes:
      - meili_data:/meili_data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:7700/health | grep -q 'available'"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [sb_net]

  # ── Nginx ─────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: sb_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./deploy/nginx/nginx.dev.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - frontend
    networks: [sb_net]

volumes:
  pg_data:
  redis_data:
  meili_data:

networks:
  sb_net:
    driver: bridge
