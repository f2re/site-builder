# Политики для мульти-агентной системы разработки
# Заменяет deprecated tools.allowed / --allowed-tools

# Разрешить все чтения файлов без подтверждения
[[rules]]
toolName = "read_file"
decision = "allow"
priority = 100

[[rules]]
toolName = "list_directory"
decision = "allow"
priority = 100

[[rules]]
toolName = "glob"
decision = "allow"
priority = 100

[[rules]]
toolName = "grep"
decision = "allow"
priority = 100

# Запись файлов — авто-разрешить в auto_edit режиме
[[rules]]
toolName = "write_file"
decision = "allow"
priority = 90
modes = ["autoEdit"]

[[rules]]
toolName = "replace"
decision = "allow"
priority = 90
modes = ["autoEdit"]

# Безопасные shell-команды — разрешить без подтверждения
[[rules]]
toolName = "run_shell_command"
commandPrefix = "cat"
decision = "allow"
priority = 80

[[rules]]
toolName = "run_shell_command"
commandPrefix = "ls"
decision = "allow"
priority = 80

[[rules]]
toolName = "run_shell_command"
commandPrefix = "mkdir"
decision = "allow"
priority = 80

[[rules]]
toolName = "run_shell_command"
commandPrefix = "ruff check"
decision = "allow"
priority = 80

[[rules]]
toolName = "run_shell_command"
commandPrefix = "mypy"
decision = "allow"
priority = 80

[[rules]]
toolName = "run_shell_command"
commandPrefix = "pytest"
decision = "allow"
priority = 80

[[rules]]
toolName = "run_shell_command"
commandPrefix = "git"
decision = "allow"
priority = 70

[[rules]]
toolName = "run_shell_command"
commandPrefix = "make"
decision = "allow"
priority = 80

[[rules]]
toolName = "run_shell_command"
commandPrefix = "npm run lint"
decision = "allow"
priority = 80

[[rules]]
toolName = "run_shell_command"
commandPrefix = "npm run type-check"
decision = "allow"
priority = 80

[[rules]]
toolName = "run_shell_command"
commandPrefix = "docker compose config"
decision = "allow"
priority = 80

[[rules]]
toolName = "run_shell_command"
commandPrefix = "alembic"
decision = "allow"
priority = 80

[[rules]]
toolName = "run_shell_command"
commandPrefix = "cd backend && alembic"
decision = "allow"
priority = 80

# Опасные команды — всегда спрашивать подтверждение
[[rules]]
toolName = "run_shell_command"
commandPrefix = "rm"
decision = "ask_user"
priority = 200

[[rules]]
toolName = "run_shell_command"
commandPrefix = "docker compose up"
decision = "ask_user"
priority = 200

[[rules]]
toolName = "run_shell_command"
commandPrefix = "git push"
decision = "ask_user"
priority = 200

# Всё остальное — спрашивать
[[rules]]
toolName = "*"
decision = "ask_user"
priority = 1
