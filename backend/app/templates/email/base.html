<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f1117; color: #e8eaf0; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: #1a1d27; border-radius: 12px; overflow: hidden; border: 1px solid #2e3147; }
        .header { background: #0f1117; padding: 32px; text-align: center; border-bottom: 2px solid #f06474; }
        .content { padding: 32px; line-height: 1.6; }
        .footer { padding: 24px; text-align: center; font-size: 12px; color: #9499b0; border-top: 1px solid #2e3147; }
        .btn { background: #f06474; color: #ffffff !important; padding: 14px 28px; text-decoration: none; border-radius: 8px; display: inline-block; font-weight: 800; text-transform: uppercase; letter-spacing: 0.05em; }
        .order-info { background: #242736; padding: 20px; border-radius: 8px; margin-block: 24px; }
        h1 { font-weight: 800; color: #ffffff; margin-top: 0; letter-spacing: -0.02em; }
        a { color: #f06474; text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2 style="color: #f06474; margin: 0; text-transform: uppercase; letter-spacing: 0.2em;">WifiOBD SHOP</h2>
        </div>
        <div class="content">
            {% block content %}{% endblock %}
        </div>
        <div class="footer">
            &copy; {{ current_year }} WifiOBD Shop · <a href="https://wifiobd.shop">wifiobd.shop</a><br>
            Если вы получили это письмо по ошибке, просто проигнорируйте его.
        </div>
    </div>
</body>
</html>
