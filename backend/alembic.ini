# Alembic configuration for site-builder backend
# Run migrations from backend/ directory:
#   alembic upgrade head
#   alembic revision --autogenerate -m "description"

[alembic]
prepend_sys_path = .
script_location = app/db/migrations

# sqlalchemy.url is overridden in env.py via Pydantic settings,
# so this placeholder is never used directly.
sqlalchemy.url = postgresql+asyncpg://user:pass@localhost/dbname

file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

timezone = UTC

[post_write_hooks]
# Uncomment to auto-format generated migration files:
# hooks = ruff
# ruff.type = exec
# ruff.entrypoint = ruff
# ruff.options = format REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %%H:%%M:%%S
