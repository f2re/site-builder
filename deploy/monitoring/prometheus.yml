# deploy/monitoring/prometheus.yml
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    env: production
    project: site-builder

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files: []

scrape_configs:

  - job_name: fastapi
    static_configs:
      - targets: ["backend:8000"]
    metrics_path: /metrics

  - job_name: postgres
    static_configs:
      - targets: ["postgres_exporter:9187"]

  - job_name: redis
    static_configs:
      - targets: ["redis_exporter:9121"]

  - job_name: celery
    static_configs:
      - targets: ["celery_exporter:9808"]

  - job_name: meilisearch
    static_configs:
      - targets: ["meilisearch:7700"]
    metrics_path: /metrics

  - job_name: nginx
    static_configs:
      - targets: ["nginx_exporter:9113"]

  - job_name: node
    static_configs:
      - targets: ["node_exporter:9100"]
