# deploy/nginx/nginx.conf
# Nginx reverse proxy: TLS termination, WebSocket, security headers,
# rate limiting, gzip, static cache.
# Managed by: devops-agent
# Contract: see .gemini/agents/devops-agent.md — Nginx Contract

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" rt=$request_time '
                    'upstream_rt=$upstream_response_time';
    access_log /var/log/nginx/access.log main;

    # ── Security ───────────────────────────────────────────────────────────
    server_tokens off;
    autoindex     off;

    # ── Performance ────────────────────────────────────────────────────────
    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout   65;
    client_max_body_size 20m;

    # ── Gzip ───────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain text/css application/json application/javascript
        text/xml application/xml application/xml+rss text/javascript
        image/svg+xml application/wasm;

    # ── Rate Limiting ──────────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=auth_limit:10m    rate=10r/m;
    limit_req_zone $binary_remote_addr zone=payment_limit:10m rate=30r/m;
    limit_req_zone $binary_remote_addr zone=api_limit:10m     rate=120r/m;
    limit_req_zone $binary_remote_addr zone=ws_limit:10m      rate=60r/m;

    # ── Upstream ───────────────────────────────────────────────────────────
    upstream backend {
        server backend:8000;
        keepalive 32;
    }

    upstream frontend {
        server frontend:3000;
        keepalive 16;
    }

    upstream grafana {
        server grafana:3000;
    }

    # ── HTTP → HTTPS redirect ──────────────────────────────────────────────
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ── Main HTTPS server ──────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name ${DOMAIN};

        # TLS
        ssl_certificate     /etc/letsencrypt/live/${DOMAIN}/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/${DOMAIN}/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_stapling        on;
        ssl_stapling_verify on;

        # ── Security Headers ───────────────────────────────────────────────
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Content-Security-Policy
            "default-src 'self'; "
            "script-src 'self' 'unsafe-inline'; "
            "style-src 'self' 'unsafe-inline'; "
            "img-src 'self' data: blob: https:; "
            "font-src 'self'; "
            "connect-src 'self' wss: https:; "
            "frame-ancestors 'none';"
            always;

        # ── Auth endpoints — strict rate limit ─────────────────────────────
        location ~ ^/api/v1/auth/ {
            limit_req zone=auth_limit burst=5 nodelay;
            limit_req_status 429;
            proxy_pass http://backend;
            include /etc/nginx/proxy_params;
        }

        # ── Payment endpoints — strict rate limit ──────────────────────────
        location ~ ^/api/v1/payments/ {
            limit_req zone=payment_limit burst=10 nodelay;
            limit_req_status 429;
            proxy_pass http://backend;
            include /etc/nginx/proxy_params;
        }

        # ── IoT WebSocket ──────────────────────────────────────────────────
        location ~ ^/api/v1/iot/ws/ {
            limit_req zone=ws_limit burst=20 nodelay;
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 3600s;   # keep WS alive 1h
            proxy_send_timeout 3600s;
        }

        # ── General API ────────────────────────────────────────────────────
        location /api/ {
            limit_req zone=api_limit burst=30 nodelay;
            proxy_pass http://backend;
            include /etc/nginx/proxy_params;
        }

        # ── MinIO media (public read) ──────────────────────────────────────
        location /media/ {
            proxy_pass http://minio:9000/media/;
            proxy_set_header Host $host;
            proxy_cache_valid 200 7d;
            add_header Cache-Control "public, max-age=604800, immutable";
        }

        # ── Nuxt static assets (1 year immutable cache) ────────────────────
        location /_nuxt/ {
            proxy_pass http://frontend;
            add_header Cache-Control "public, max-age=31536000, immutable";
            include /etc/nginx/proxy_params;
        }

        # ── Grafana (admin only, protected path) ───────────────────────────
        location /grafana/ {
            proxy_pass http://grafana;
            include /etc/nginx/proxy_params;
        }

        # ── Frontend (SSR) ─────────────────────────────────────────────────
        location / {
            proxy_pass http://frontend;
            include /etc/nginx/proxy_params;
        }
    }
}
