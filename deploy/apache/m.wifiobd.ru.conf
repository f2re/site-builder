# Apache VirtualHost для m.wifiobd.ru
# Скопировать в /etc/apache2/sites-available/m.wifiobd.ru.conf
# Инструкция по настройке: DEVOPS.md раздел 7-8
#
# Требуемые модули:
#   a2enmod proxy proxy_http proxy_wstunnel ssl rewrite headers

# ── HTTP → HTTPS + ACME challenge ────────────────────────────────────────────
<VirtualHost *:80>
    ServerName m.wifiobd.ru

    # Let's Encrypt ACME — ОБЯЗАТЕЛЬНО до RewriteRule
    Alias /.well-known/acme-challenge/ /var/www/letsencrypt/.well-known/acme-challenge/
    <Directory /var/www/letsencrypt/.well-known/acme-challenge/>
        Options None
        AllowOverride None
        Require all granted
    </Directory>

    RewriteEngine On
    RewriteCond %{REQUEST_URI} !^/\.well-known/
    RewriteRule ^ https://%{HTTP_HOST}%{REQUEST_URI} [R=301,L]
</VirtualHost>

# ── HTTPS — main reverse proxy ─────────────────────────────────────────────
# ВНИМАНИЕ: раскомментировать ТОЛЬКО после получения SSL-сертификата!
# certbot certonly --webroot -w /var/www/letsencrypt -d m.wifiobd.ru
<VirtualHost *:443>
    ServerName m.wifiobd.ru

    SSLEngine on
    SSLCertificateFile    /etc/letsencrypt/live/m.wifiobd.ru/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/m.wifiobd.ru/privkey.pem

    ErrorLog  /var/log/apache2/m.wifiobd.ru-error.log
    CustomLog /var/log/apache2/m.wifiobd.ru-access.log combined

    ProxyPreserveHost On
    ProxyRequests     Off

    # ── Передать реальный IP и протокол в контейнеры ───────────────────────────
    # ОБЯЗАТЕЛЬНО до ProxyPass! FastAPI читает X-Forwarded-Proto через
    # ProxyHeadersMiddleware и строит правильные https:// URL в redirect.
    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Real-IP "%{REMOTE_ADDR}s"
    RequestHeader set X-Forwarded-For "%{REMOTE_ADDR}s"

    # ── Страховка: переписываем http:// → https:// в Location-заголовках ───────
    # Защищает от Mixed Content, если какой-либо сервис вернёт http:// redirect.
    Header edit Location ^http://m\.wifiobd\.ru(.*) https://m.wifiobd.ru$1

    # ── WebSocket (IoT / real-time) ─────────────────────────────────────────────
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} websocket [NC]
    RewriteCond %{HTTP:Connection} upgrade  [NC]
    RewriteRule ^/ws/(.*)$ ws://localhost:8000/ws/$1 [P,L]

    ProxyPass        /ws/ ws://localhost:8000/ws/
    ProxyPassReverse /ws/ ws://localhost:8000/ws/

    # ── MeiliSearch (мастер-ключ скрыт, браузер использует search-only ключ) ──
    ProxyPass        /search/ http://localhost:7700/
    ProxyPassReverse /search/ http://localhost:7700/

    # ── Backend API (FastAPI) ───────────────────────────────────────────────────
    # Проксируем только v1, чтобы не конфликтовать с внутренними API Nuxt (напр. /api/_nuxt_icon)
    ProxyPass        /api/v1/    http://localhost:8000/api/v1/
    ProxyPassReverse /api/v1/    http://localhost:8000/api/v1/

    # ── Media файлы ─────────────────────────────────────────────────────────────────────
    ProxyPass        /media/  http://localhost:8000/media/
    ProxyPassReverse /media/  http://localhost:8000/media/

    # ── Frontend Nuxt SSR (последним — всё остальное) ───────────────────────
    ProxyPass        / http://localhost:3000/
    ProxyPassReverse / http://localhost:3000/

    # Таймауты для SSR и долгих API запросов
    ProxyTimeout 60
    Timeout      60
</VirtualHost>
