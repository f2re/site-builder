# deploy/docker-compose.prod.yml

version: "3.9"

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:

  backend:
    image: ${CI_REGISTRY_IMAGE}/backend:${IMAGE_TAG:-latest}
    container_name: sb_backend
    restart: always
    env_file: /srv/site-builder/.env.prod
    expose:
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >-
      gunicorn app.main:app
      -w 4 -k uvicorn.workers.UvicornWorker
      --bind 0.0.0.0:8000
      --access-logfile -
      --error-logfile -
      --timeout 60
    user: appuser
    read_only: true
    tmpfs:
      - /tmp
    logging: *default-logging
    networks: [sb_net]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/api/v1/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  frontend:
    image: ${CI_REGISTRY_IMAGE}/frontend:${IMAGE_TAG:-latest}
    container_name: sb_frontend
    restart: always
    env_file: /srv/site-builder/.env.prod
    ports:
      - "3000:3000"
    command: node .output/server/index.mjs
    user: appuser
    logging: *default-logging
    networks: [sb_net]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: sb_postgres
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    expose:
      - "5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    logging: *default-logging
    healthcheck:
      # Use explicit default fallback so healthcheck never runs with empty user/db
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [sb_net]

  redis:
    image: redis:7-alpine
    container_name: sb_redis
    restart: always
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    command: >
      redis-server
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --requirepass ${REDIS_PASSWORD}
    logging: *default-logging
    healthcheck:
      # Use REDISCLI_AUTH env var instead of -a flag to handle any password value safely
      test: ["CMD-SHELL", "REDISCLI_AUTH=${REDIS_PASSWORD} redis-cli ping | grep -q PONG"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks: [sb_net]

  celery:
    image: ${CI_REGISTRY_IMAGE}/backend:${IMAGE_TAG:-latest}
    container_name: sb_celery
    restart: always
    env_file: /srv/site-builder/.env.prod
    depends_on:
      - redis
      - postgres
    command: celery -A app.tasks.celery_app worker -B --loglevel=warning --concurrency=2 -E
    user: appuser
    logging: *default-logging
    networks: [sb_net]

  meilisearch:
    image: getmeili/meilisearch:latest
    container_name: sb_meilisearch
    restart: always
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}
      MEILI_ENV: production
      MEILI_NO_ANALYTICS: "true"
    expose:
      - "7700"
    volumes:
      - meili_data:/meili_data
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:7700/health | grep -q 'available'"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks: [sb_net]

volumes:
  pg_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /srv/site-builder/data/postgres
  redis_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /srv/site-builder/data/redis
  meili_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /srv/site-builder/data/meilisearch

networks:
  sb_net:
    driver: bridge
