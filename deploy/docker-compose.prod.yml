# deploy/docker-compose.prod.yml — Production Environment
# Usage: docker compose -f deploy/docker-compose.prod.yml up -d
# Secrets: all via .env.prod (gitignored) or GitLab CI/CD Variables
# Images: pulled from GitLab Container Registry ($CI_REGISTRY_IMAGE)

version: "3.9"

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"
    labels: "service"

services:

  # ── Backend ────────────────────────────────────────────────────────────────
  backend:
    image: ${CI_REGISTRY_IMAGE}/backend:${IMAGE_TAG:-latest}
    container_name: sb_backend
    restart: always
    env_file: /srv/site-builder/.env.prod
    expose:
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
    command: >-
      gunicorn app.main:app
      -w 4 -k uvicorn.workers.UvicornWorker
      --bind 0.0.0.0:8000
      --access-logfile -
      --error-logfile -
      --timeout 60
    user: appuser
    read_only: true
    tmpfs:
      - /tmp
    logging: *default-logging
    labels:
      - "service=backend"
    networks: [sb_net]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/api/v1/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── Frontend ───────────────────────────────────────────────────────────────
  frontend:
    image: ${CI_REGISTRY_IMAGE}/frontend:${IMAGE_TAG:-latest}
    container_name: sb_frontend
    restart: always
    env_file: /srv/site-builder/.env.prod
    expose:
      - "3000"
    command: node .output/server/index.mjs
    user: appuser
    logging: *default-logging
    labels:
      - "service=frontend"
    networks: [sb_net]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── PostgreSQL 16 + TimescaleDB ────────────────────────────────────────────
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: sb_postgres
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    expose:
      - "5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [sb_net]

  # ── Redis 7 ────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: sb_redis
    restart: always
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    command: >
      redis-server
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --requirepass ${REDIS_PASSWORD}
    logging: *default-logging
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks: [sb_net]

  # ── Celery Worker ──────────────────────────────────────────────────────────
  celery_worker:
    image: ${CI_REGISTRY_IMAGE}/backend:${IMAGE_TAG:-latest}
    container_name: sb_celery_worker
    restart: always
    env_file: /srv/site-builder/.env.prod
    depends_on:
      - redis
      - postgres
    command: celery -A app.tasks.celery_app worker --loglevel=warning --concurrency=4 -E
    user: appuser
    logging: *default-logging
    labels:
      - "service=celery_worker"
    networks: [sb_net]

  # ── Celery Beat ────────────────────────────────────────────────────────────
  celery_beat:
    image: ${CI_REGISTRY_IMAGE}/backend:${IMAGE_TAG:-latest}
    container_name: sb_celery_beat
    restart: always
    env_file: /srv/site-builder/.env.prod
    depends_on:
      - redis
    command: celery -A app.tasks.celery_app beat --loglevel=warning --scheduler redbeat.RedBeatScheduler
    user: appuser
    logging: *default-logging
    networks: [sb_net]

  # ── Meilisearch ────────────────────────────────────────────────────────────
  meilisearch:
    image: getmeili/meilisearch:latest
    container_name: sb_meilisearch
    restart: always
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}
      MEILI_ENV: production
      MEILI_NO_ANALYTICS: "true"
    expose:
      - "7700"
    volumes:
      - meili_data:/meili_data
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:7700/health | grep -q 'available'"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks: [sb_net]

  # ── MinIO ──────────────────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: sb_minio
    restart: always
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BROWSER: "off"   # disable console in prod
    expose:
      - "9000"
    volumes:
      - minio_data:/data
    command: server /data
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks: [sb_net]

  # ── Nginx (TLS termination, reverse proxy) ─────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: sb_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - nginx_cache:/var/cache/nginx
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    logging: *default-logging
    networks: [sb_net]

  # ── Prometheus ────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: sb_prometheus
    restart: always
    expose:
      - "9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command: >
      --config.file=/etc/prometheus/prometheus.yml
      --storage.tsdb.retention.time=30d
      --web.enable-lifecycle
    logging: *default-logging
    networks: [sb_net]

  # ── Grafana ───────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: sb_grafana
    restart: always
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: https://${DOMAIN}/grafana/
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    expose:
      - "3000"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    logging: *default-logging
    networks: [sb_net]

  # ── Loki ──────────────────────────────────────────────────────────────────
  loki:
    image: grafana/loki:latest
    container_name: sb_loki
    restart: always
    expose:
      - "3100"
    volumes:
      - ./monitoring/loki.yml:/etc/loki/loki.yml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/loki.yml
    logging: *default-logging
    networks: [sb_net]

  # ── Promtail ──────────────────────────────────────────────────────────────
  promtail:
    image: grafana/promtail:latest
    container_name: sb_promtail
    restart: always
    volumes:
      - ./monitoring/promtail.yml:/etc/promtail/promtail.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/promtail.yml
    depends_on:
      - loki
    logging: *default-logging
    networks: [sb_net]

volumes:
  pg_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /srv/site-builder/data/postgres
  redis_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /srv/site-builder/data/redis
  meili_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /srv/site-builder/data/meilisearch
  minio_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /srv/site-builder/data/minio
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  loki_data:
    driver: local
  nginx_cache:
    driver: local

networks:
  sb_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
