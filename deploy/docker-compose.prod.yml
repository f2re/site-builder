# deploy/docker-compose.prod.yml — Production Environment
# Usage: docker compose -f deploy/docker-compose.prod.yml up -d
# Secrets: all via .env.prod (gitignored) or GitLab CI/CD Variables
# Images: pulled from GitLab Container Registry ($CI_REGISTRY_IMAGE)

version: "3.9"

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"
    labels: "service"

services:

  # ── Backend ────────────────────────────────────────────────────────────────
  backend:
    image: ${CI_REGISTRY_IMAGE}/backend:${IMAGE_TAG:-latest}
    container_name: sb_backend
    restart: always
    env_file: /srv/site-builder/.env.prod
    expose:
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >-
      gunicorn app.main:app
      -w 4 -k uvicorn.workers.UvicornWorker
      --bind 0.0.0.0:8000
      --access-logfile -
      --error-logfile -
      --timeout 60
    user: appuser
    read_only: true
    tmpfs:
      - /tmp
    logging: *default-logging
    labels:
      - "service=backend"
    networks: [sb_net]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/api/v1/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── Frontend ───────────────────────────────────────────────────────────────
  frontend:
    image: ${CI_REGISTRY_IMAGE}/frontend:${IMAGE_TAG:-latest}
    container_name: sb_frontend
    restart: always
    env_file: /srv/site-builder/.env.prod
    expose:
      - "3000"
    command: node .output/server/index.mjs
    user: appuser
    logging: *default-logging
    labels:
      - "service=frontend"
    networks: [sb_net]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── PostgreSQL 16 + TimescaleDB ────────────────────────────────────────────
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: sb_postgres
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    expose:
      - "5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [sb_net]

  # ── Redis 7 ────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: sb_redis
    restart: always
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    command: >
      redis-server
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --requirepass ${REDIS_PASSWORD}
    logging: *default-logging
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks: [sb_net]

  # ── Celery (worker + beat в одном контейнере) ──────────────────────────────
  celery:
    image: ${CI_REGISTRY_IMAGE}/backend:${IMAGE_TAG:-latest}
    container_name: sb_celery
    restart: always
    env_file: /srv/site-builder/.env.prod
    depends_on:
      - redis
      - postgres
    # -B запускает beat-планировщик внутри того же процесса worker
    command: celery -A app.tasks.celery_app worker -B --loglevel=warning --concurrency=2 -E
    user: appuser
    logging: *default-logging
    labels:
      - "service=celery"
    networks: [sb_net]

  # ── Meilisearch ────────────────────────────────────────────────────────────
  meilisearch:
    image: getmeili/meilisearch:latest
    container_name: sb_meilisearch
    restart: always
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}
      MEILI_ENV: production
      MEILI_NO_ANALYTICS: "true"
    expose:
      - "7700"
    volumes:
      - meili_data:/meili_data
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:7700/health | grep -q 'available'"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks: [sb_net]

  # ── Nginx (TLS termination, reverse proxy) ─────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: sb_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - nginx_cache:/var/cache/nginx
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    logging: *default-logging
    networks: [sb_net]

volumes:
  pg_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /srv/site-builder/data/postgres
  redis_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /srv/site-builder/data/redis
  meili_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /srv/site-builder/data/meilisearch
  nginx_cache:
    driver: local

networks:
  sb_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
